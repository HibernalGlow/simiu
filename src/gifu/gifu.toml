[output]
# gif | webp | wbp | apng | webm | mp4 | auto
format = "wbp"
quality = 85
# webp 编码档位 0-6，越低越快
webp_method = 4
# 每帧时长（毫秒）
duration_ms = 420
# 循环次数，0 为无限
loop = 0
# 输出模式: same(与压缩包同目录) | separate(上一级创建prefix子文件夹)
out_mode = "same"

[video]
# 视频编码线程，0 自动
ffmpeg_threads = 0
# webm: CRF 0-63，越大越快
webm_crf = 34
# webm: 0-8，越大越快
webm_cpu_used = 6
# mp4 av1_nvenc preset: p1-p7，越小越快
mp4_preset = "p3"
# mp4 CQ: 0-63，越小越清晰
mp4_cq = 32

[naming]
# 默认前缀
prefix = "[#dyna]"
# 可用变量: {prefix} {stem} {archive} {parent}
template = "{prefix}{stem}"
